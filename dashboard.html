<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --border: #1f2330;
      --accent: #00e5a0;
      --accent2: #0066ff;
      --text: #e8eaf0;
      --muted: #5a6070;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 36px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.03em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 500;
      background: rgba(0,229,160,0.12);
      color: var(--accent);
      border: 1px solid rgba(0,229,160,0.3);
      padding: 4px 12px;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 14px 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .toolbar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-right: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.2s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
      border-color: var(--accent);
      font-weight: 700;
    }
    .btn-primary:hover { opacity: 0.85; color: #0d0f14; }

    /* ── FRAME WRAPPER ── */
    .frame-wrapper {
      flex: 1;
      padding: 28px 36px 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .frame-card {
      flex: 1;
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      position: relative;
      min-height: 70vh;
    }

    /* glow corners */
    .frame-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 200px; height: 2px;
      background: linear-gradient(to right, var(--accent), transparent);
      border-radius: 2px;
      z-index: 1;
    }
    .frame-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 2px; height: 200px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      border-radius: 2px;
      z-index: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 70vh;
      border: none;
      display: block;
    }

    /* loading overlay */
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--surface);
      z-index: 5;
      transition: opacity 0.5s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { color: var(--muted); font-size: 0.85rem; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 14px;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer span { color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      Dashboard
    </div>
    <div class="badge">● AO VIVO</div>
  </header>

  <div class="toolbar">
    <span class="toolbar-title">📊 Planilha — Aba: DASHBOARD</span>
    <a class="btn" href="https://1drv.ms/x/c/687ef4108555f82a/IQDjYJKhqGN6RoFvjgo5oXtxAezphDm50s4jx6BW9fPjOGg?e=oc342L" target="_blank">
      ↗ Abrir no Excel Online
    </a>
    <button class="btn btn-primary" onclick="reloadFrame()">↺ Atualizar</button>
  </div>

  <div class="frame-wrapper">
    <div class="frame-card">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Carregando dashboard…</p>
      </div>
      <!--
        Para exibir uma aba específica do OneDrive/Excel Online,
        use o link de incorporação gerado pelo próprio OneDrive:
        Arquivo → Compartilhar → Incorporar → copie o src do <iframe>.

        Por enquanto usamos o link direto que redireciona para o Excel Online.
        Substitua o src abaixo pelo link de incorporação gerado pelo OneDrive
        caso queira remover a barra de ferramentas do Office e exibir só os dados.
      -->
      <iframe
        id="xlframe"
        src="https://1drv.ms/x/c/687ef4108555f82a/IQDjYJKhqGN6RoFvjgo5oXtxAezphDm50s4jx6BW9fPjOGg?e=oc342L&action=embedview&wdAllowInteractivity=True&wdHideGridlines=False&wdHideHeaders=False&wdDownloadButton=True&wdInConfigurator=True&wdInConfigurator=True"
        onload="hideLoader()"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <footer>
    Dados sincronizados via <span>OneDrive / Excel Online</span>
  </footer>

  <script>
    function hideLoader() {
      document.getElementById('loading').classList.add('hidden');
    }

    function reloadFrame() {
      const frame = document.getElementById('xlframe');
      const loader = document.getElementById('loading');
      loader.classList.remove('hidden');
      frame.src = frame.src; // força reload
    }

    // fallback: esconde loader após 12s mesmo que o onload não dispare
    setTimeout(hideLoader, 12000);
  </script>

</body>
</html>
